<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>康鲁泉净水器维修管理系统</title>
    <!-- 使用国内更稳定的 CDN -->
    <script src="https://lib.baomitu.com/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://lib.baomitu.com/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://lib.baomitu.com/lucide/0.263.0/lucide.min.js"></script>
    <script src="https://cdn.staticfile.org/tailwindcss/2.2.19/tailwind.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .selection-none { -webkit-tap-highlight-color: transparent; }
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            z-index: 9999;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="loading">
        <div class="text-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-gray-500 font-bold">系统加载中...</p>
        </div>
    </div>
    <div id="root"></div>

    <script>
        // 错误捕获
        window.onerror = function(msg, url, line) {
            alert("系统加载错误: " + msg + "\n位置: " + line);
            return false;
        };

        // 检查 React 是否加载成功
        if (typeof React === 'undefined') {
            document.body.innerHTML = '<div style="padding: 20px; text-align: center; color: red;"><h3>加载失败</h3><p>无法连接到基础库，请检查网络连接或尝试刷新页面。</p></div>';
        }

        // 隐藏加载动画
        window.onload = () => {
            const loader = document.getElementById('loading');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
            }
        };

        const { useState, useEffect, useMemo } = React;

        // --- Storage Logic ---
        const STORAGE_KEY = 'kangluquan_machines_v1';
        const getMachines = () => {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        };
        const saveMachines = (machines) => {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(machines));
        };

        // --- App Component ---
        function App() {
            const [machines, setMachines] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterStatus, setFilterStatus] = useState('all');
            const [modalType, setModalType] = useState(null);
            const [selectedMachine, setSelectedMachine] = useState(null);

            // Form states
            const [newId, setNewId] = useState('');
            const [newCommunity, setNewCommunity] = useState('');
            const [newLocation, setNewLocation] = useState('');
            const [newPerson, setNewPerson] = useState('');
            const [faultDesc, setFaultDesc] = useState('');
            const [repairContent, setRepairContent] = useState('');

            useEffect(() => {
                const initial = getMachines();
                if (initial.length === 0) {
                    // Seed some data if empty
                    const seed = [
                        { id: 'KLQ-001', community: '阳光花园', location: '1号楼1单元', currentStatus: 'normal', repairHistory: [] },
                        { id: 'KLQ-002', community: '月亮湾', location: '5号楼东侧', currentStatus: 'pending', repairHistory: [] }
                    ];
                    saveMachines(seed);
                    setMachines(seed);
                } else {
                    setMachines(initial);
                }
                lucide.createIcons();
            }, []);

            useEffect(() => { lucide.createIcons(); }, [machines, modalType, filterStatus, searchTerm]);

            const refresh = () => setMachines(getMachines());

            const filtered = useMemo(() => {
                return machines
                    .filter(m => {
                        const matchSearch = m.id.includes(searchTerm) || m.community.includes(searchTerm);
                        const matchFilter = filterStatus === 'all' || m.currentStatus === filterStatus;
                        return matchSearch && matchFilter;
                    })
                    .sort((a, b) => {
                        const isAActive = a.currentStatus === 'pending' || a.currentStatus === 'in_progress';
                        const isBActive = b.currentStatus === 'pending' || b.currentStatus === 'in_progress';
                        if (isAActive && !isBActive) return -1;
                        if (!isAActive && isBActive) return 1;
                        return a.id.localeCompare(b.id);
                    });
            }, [machines, searchTerm, filterStatus]);

            const handleAdd = (e) => {
                e.preventDefault();
                const current = getMachines();
                if (current.find(m => m.id === newId)) return alert('编号已存在');
                const next = [...current, { id: newId, community: newCommunity, location: newLocation, currentStatus: 'normal', repairHistory: [] }];
                saveMachines(next);
                setNewId(''); setNewCommunity(''); setNewLocation(''); setModalType(null);
                refresh();
            };

            const handleUpdateStatus = (id, status, extra = {}) => {
                const current = getMachines();
                const idx = current.findIndex(m => m.id === id);
                if (idx === -1) return;
                
                const machine = current[idx];
                machine.currentStatus = status;
                if (status === 'pending') {
                    machine.repairHistory.unshift({
                        id: Date.now().toString(),
                        date: new Date().toLocaleString(),
                        type: 'fault',
                        description: extra.desc,
                        worker: '张工'
                    });
                } else if (status === 'completed') {
                    const active = machine.repairHistory[0];
                    if (active) {
                        active.completeDate = new Date().toLocaleString();
                        active.repairContent = extra.content;
                    }
                }
                
                saveMachines(current);
                setModalType(null);
                refresh();
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <header className="bg-white border-b p-4 sticky top-0 z-10 shadow-sm">
                        <div className="flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="bg-blue-600 p-2 rounded-lg text-white">
                                    <i data-lucide="wrench" size="20"></i>
                                </div>
                                <div>
                                    <h1 className="font-black text-lg">康鲁泉管理系统</h1>
                                    <p className="text-[10px] text-gray-400 font-bold uppercase">Water Purifier Pro</p>
                                </div>
                            </div>
                            <button onClick={() => setModalType('add')} className="bg-blue-600 text-white p-2 rounded-xl shadow-lg">
                                <i data-lucide="plus" size="20"></i>
                            </button>
                        </div>
                    </header>

                    {/* Search & Filter */}
                    <div className="p-4 space-y-3">
                        <div className="relative">
                            <i data-lucide="search" className="absolute left-4 top-3.5 text-gray-400" size="18"></i>
                            <input 
                                type="text" 
                                placeholder="搜索设备编号或小区..." 
                                className="w-full pl-12 pr-4 py-3 bg-white border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500"
                                value={searchTerm}
                                onChange={e => setSearchTerm(e.target.value)}
                            />
                        </div>
                        <div className="flex gap-2 overflow-x-auto pb-2">
                            {['all', 'normal', 'pending', 'in_progress'].map(s => (
                                <button 
                                    key={s}
                                    onClick={() => setFilterStatus(s)}
                                    className={`px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap border transition-all ${filterStatus === s ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-500 border-gray-200'}`}
                                >
                                    {s === 'all' ? '全部' : s === 'normal' ? '正常' : s === 'pending' ? '待维修' : '维修中'}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* List */}
                    <div className="px-4 space-y-4">
                        {filtered.map(m => (
                            <div key={m.id} className={`bg-white p-4 rounded-2xl border-2 transition-all ${m.currentStatus === 'pending' ? 'border-red-100 shadow-lg shadow-red-50' : 'border-gray-100'}`}>
                                <div className="flex justify-between items-start mb-4">
                                    <div>
                                        <h3 className="font-black text-gray-900">{m.id}</h3>
                                        <p className="text-xs text-gray-400 font-medium">{m.community} · {m.location}</p>
                                    </div>
                                    <span className={`px-2 py-1 rounded-lg text-[10px] font-black uppercase ${m.currentStatus === 'normal' ? 'bg-green-50 text-green-600' : 'bg-red-50 text-red-600'}`}>
                                        {m.currentStatus === 'normal' ? '运行中' : '故障'}
                                    </span>
                                </div>
                                
                                <div className="flex gap-2">
                                    {m.currentStatus === 'normal' ? (
                                        <button 
                                            onClick={() => { setSelectedMachine(m); setModalType('report'); }}
                                            className="flex-1 py-2.5 bg-red-50 text-red-600 rounded-xl text-xs font-bold hover:bg-red-100"
                                        >
                                            报修
                                        </button>
                                    ) : (
                                        <button 
                                            onClick={() => handleUpdateStatus(m.id, 'normal', { content: '已修复' })}
                                            className="flex-1 py-2.5 bg-green-600 text-white rounded-xl text-xs font-bold"
                                        >
                                            完成维修
                                        </button>
                                    )}
                                    <button 
                                        onClick={() => alert('历史记录功能请使用完整版')}
                                        className="px-4 py-2.5 bg-gray-50 text-gray-500 rounded-xl text-xs font-bold"
                                    >
                                        记录
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Add Modal */}
                    {modalType === 'add' && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-end sm:items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 space-y-4">
                                <div className="flex justify-between items-center">
                                    <h2 className="font-black text-xl">新增设备</h2>
                                    <button onClick={() => setModalType(null)}><i data-lucide="x"></i></button>
                                </div>
                                <form onSubmit={handleAdd} className="space-y-4">
                                    <input required placeholder="设备编号 (如 KLQ-001)" className="w-full p-4 bg-gray-50 rounded-2xl outline-none" value={newId} onChange={e => setNewId(e.target.value)} />
                                    <input required placeholder="所属小区" className="w-full p-4 bg-gray-50 rounded-2xl outline-none" value={newCommunity} onChange={e => setNewCommunity(e.target.value)} />
                                    <input required placeholder="具体位置" className="w-full p-4 bg-gray-50 rounded-2xl outline-none" value={newLocation} onChange={e => setNewLocation(e.target.value)} />
                                    <button type="submit" className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black">确认添加</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Report Modal */}
                    {modalType === 'report' && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-end sm:items-center justify-center p-4">
                            <div className="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 space-y-4">
                                <h2 className="font-black text-xl">故障报修 - {selectedMachine?.id}</h2>
                                <textarea 
                                    className="w-full p-4 bg-gray-50 rounded-2xl outline-none h-32" 
                                    placeholder="请描述故障情况..."
                                    value={faultDesc}
                                    onChange={e => setFaultDesc(e.target.value)}
                                ></textarea>
                                <button 
                                    onClick={() => handleUpdateStatus(selectedMachine.id, 'pending', { desc: faultDesc })}
                                    className="w-full py-4 bg-red-600 text-white rounded-2xl font-black"
                                >
                                    提交报修
                                </button>
                                <button onClick={() => setModalType(null)} className="w-full py-2 text-gray-400 font-bold">取消</button>
                            </div>
                        </div>
                    )}

                    <footer className="p-8 text-center text-gray-300 text-[10px] font-bold uppercase tracking-widest">
                        © 2026 康鲁泉净水器管理系统 · 离线版
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
